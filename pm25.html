<script>

let chart
let history=[]

function getLevel(aqi){

if(aqi<=25)return["ดีมาก","😃","#00e400"]
if(aqi<=50)return["ดี","🙂","#ffff00"]
if(aqi<=100)return["ปานกลาง","😐","#ff7e00"]
if(aqi<=200)return["มีผลกระทบ","😷","#ff0000"]
if(aqi<=300)return["อันตราย","🤒","#8f3f97"]
return["อันตรายมาก","☠️","#7e0023"]

}

async function loadData(){

const val=document.getElementById("province").value
const lat=val.split(",")[0]
const lon=val.split(",")[1]

const url=`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${lat}&longitude=${lon}&hourly=pm2_5`

const res=await fetch(url)
const data=await res.json()

const arr=data.hourly.pm2_5
const pm=arr[arr.length-1]

updateUI(pm,arr.slice(-24))

}

function updateUI(pm,ย้อนหลัง){

document.getElementById("aqi").innerText=pm.toFixed(1)

const [text,icon,color]=getLevel(pm)

document.getElementById("level").innerText=text
document.getElementById("icon").innerText=icon

document.body.style.background=color+"33"
document.getElementById("marker").style.left =
Math.min(pm,300)/300*100 + "%";

history=ย้อนหลัง
chart.data.datasets[0].data=history
chart.update()

}

document.getElementById("province").onchange=loadData

chart=new Chart(document.getElementById("chart"),{
type:"line",
data:{
labels:new Array(24).fill(""),
datasets:[{
label:"PM2.5 ย้อนหลัง 24 ชม.",
data:history,
borderWidth:2,
tension:.4
}]
},
options:{
plugins:{legend:{labels:{color:"#fff"}}},
scales:{
y:{ticks:{color:"#fff"}},
x:{ticks:{color:"#fff"}}
}
}
})

loadData()
setInterval(loadData,300000)

</script>
